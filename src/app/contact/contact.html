 <section id="contact" class="py-20 md:py-28 px-6 md:px-12 lg:px-24 max-w-7xl mx-auto text-center lumon-section mt-10">
      <div class="inline-block px-4 py-1 rounded-full border border-lumon-600/70 bg-lumon-800/40 text-lumon-300 font-mono text-xs font-bold uppercase tracking-widest mb-6">Secure Terminal: BRU-TERMINAL-01</div>
      <h2 class="font-display text-4xl md:text-5xl font-bold text-lumon-100 mb-12">Initiate Transmission</h2>
      
      <div class="bg-lumon-900/70 p-2 rounded-sm shadow-xl border border-lumon-700/70 max-w-lg mx-auto overflow-hidden">
        <div class="bg-lumon-800/70 rounded border border-lumon-700/70 p-8">
          <p class="text-lumon-400 mb-8 font-medium italic font-mono text-sm">"Please enjoy all transmission channels equally."</p>
          <div class="space-y-4">
            <a href="mailto:jolande.steenput@gmail.com" class="flex items-center justify-center gap-3 w-full py-4 bg-lumon-700 text-white rounded-sm font-mono text-sm font-bold uppercase tracking-widest hover:bg-lumon-600 transition-all shadow-lg">
              <i data-lucide="mail" class="w-4 h-4"></i> Send Packet
            </a>
            
            <div class="flex gap-4">
                <a *ngFor="let social of socials" [href]="social.url" target="_blank" class="flex-1 flex items-center justify-center gap-2 py-3 border border-lumon-600/80 text-lumon-300 rounded-sm font-mono text-xs font-bold uppercase tracking-widest hover:bg-lumon-700/60 hover:text-white transition-all">
                    {{social.platform}}
                </a>
            </div>
          </div>
        </div>
      </div>
      
      <div class="mt-16 opacity-60 font-mono text-[10px] text-lumon-500 tracking-widest uppercase">
        Brussels, Belgium // UTC+1
      </div>
    </section>
